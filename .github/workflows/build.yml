name: Build Desktop And Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        env:
          RUST_BACKTRACE: "full"
        run: flutter build apk --release -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install FFmpeg via vcpkg
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT")) {
              Write-Host "Cloning vcpkg to $env:VCPKG_ROOT..."
              git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          }
          if (-not (Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
              Write-Host "Bootstrapping vcpkg..."
              $currentDir = Get-Location
              cd "$env:VCPKG_ROOT"
              cmd.exe /c "bootstrap-vcpkg.bat -disableMetrics"
              cd $currentDir
          }
          $env:VCPKG_ROOT = $env:VCPKG_ROOT.Replace('\', '/')
          Write-Host "Using VCPKG_ROOT for bash: $env:VCPKG_ROOT"
          $script = Get-ChildItem -Path "$env:LOCALAPPDATA/Pub/Cache" -Filter "download_sources.sh" -Recurse -Force -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($script) {
              Write-Host "Found download_sources.sh at $($script.FullName)"
              $dir = $script.DirectoryName
              cd $dir
              bash ./download_sources.sh
          } else {
              Write-Error "Could not find download_sources.sh in Pub Cache!"
              exit 1
          }

      - name: Patch cargokit symlink resolver
        shell: pwsh
        run: |
          $pubCache = If ($env:PUB_CACHE) { $env:PUB_CACHE } Else { Join-Path $env:LOCALAPPDATA "Pub/Cache" }
          Write-Host "Pub Cache path: $pubCache"
          if (Test-Path $pubCache) {
              Get-ChildItem -Path $pubCache -Filter "resolve_symlinks.ps1" -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "Patching pub cache: $_"
                  (Get-Content $_.FullName -Raw) -replace 'Get-Item\s+\$realPath', 'Get-Item -Force $realPath' | Set-Content $_.FullName
              }
          }
          Get-ChildItem -Path . -Filter "resolve_symlinks.ps1" -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Patching workspace: $_"
              (Get-Content $_.FullName -Raw) -replace 'Get-Item\s+\$realPath', 'Get-Item -Force $realPath' | Set-Content $_.FullName
          }

      - name: Build Windows
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-audio
        run: flutter build windows --release -v

      - name: Build Windows MSIX
        run: dart run msix:create --build-windows false

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $output = "vibeflow-windows.zip"
          if (Test-Path $output) { Remove-Item $output -Force }
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $output

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            vibeflow-windows.zip
            build/windows/msix/*.msix

  linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake pkg-config libgtk-3-dev liblzma-dev tar libasound2-dev

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: tar -czf vibeflow-linux.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: vibeflow-linux.tar.gz

  macos:
    name: Build macOS Package (Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        xcode: ['16.4', '26.3']
    env:
      CXXFLAGS: -std=gnu++20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin, aarch64-apple-darwin
          rustflags: ""

      - name: Print Apple toolchain diagnostics
        run: |
          echo "Runner:"
          uname -a
          sw_vers

          echo "Xcode selection:"
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

          echo "Tool versions:"
          clang++ --version
          xcrun clang++ --version
          swift --version
          swiftc --version

          echo "SDK info:"
          xcrun --sdk macosx --show-sdk-path
          xcrun --sdk macosx --show-sdk-version

          echo "Available Xcodes:"
          ls -1 /Applications | grep '^Xcode' | sort || true

          echo "C++20 jthread smoke test:"
          cat > /tmp/jthread_test.cpp <<'EOF'
          #include <thread>
          #include <stop_token>
          #include <iostream>

          int main() {
            std::jthread t([](std::stop_token) {});
            std::cout << __cplusplus << std::endl;
            return 0;
          }
          EOF
          xcrun clang++ -std=gnu++20 /tmp/jthread_test.cpp -o /tmp/jthread_test
          /tmp/jthread_test

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean macOS package caches
        run: |
          rm -rf build/macos

      - name: Resolve macOS Swift packages
        run: xcodebuild -resolvePackageDependencies -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -derivedDataPath build/macos/resolve -clonedSourcePackagesDirPath build/macos/SourcePackages

      - name: Print SFBAudioEngine resolution
        run: |
          echo "Package.resolved entry:"
          grep -n '"location" : "https://github.com/sbooth/SFBAudioEngine"' -A 6 -B 2 macos/Runner.xcworkspace/xcshareddata/swiftpm/Package.resolved || true

          CHECKOUT="build/macos/resolve/SourcePackages/checkouts/SFBAudioEngine"
          if [ -d "$CHECKOUT" ]; then
            echo "Checkout HEAD:"
            git -C "$CHECKOUT" rev-parse HEAD
            echo "Checkout Package.swift:"
            sed -n '1,160p' "$CHECKOUT/Package.swift"
          else
            echo "SFBAudioEngine checkout not found at $CHECKOUT"
          fi

          echo "SwiftPM configuration:"
          find macos/Runner.xcworkspace/xcshareddata/swiftpm -maxdepth 2 -type f | sort | while read -r file; do
            echo "--- $file"
            sed -n '1,120p' "$file"
          done

          echo "Runner build settings:"
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -showBuildSettings | grep -E 'CLANG_CXX_LANGUAGE_STANDARD|OTHER_CPLUSPLUSFLAGS|SWIFT_PACKAGE|PACKAGE' || true

      - name: Xcode diagnostic build
        run: |
          set -o pipefail
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -destination 'platform=macOS' -derivedDataPath build/macos/diag -clonedSourcePackagesDirPath build/macos/SourcePackages -verbose build | tee build/macos/xcodebuild-diag.log || true

          echo "Relevant compile lines:"
          grep -nE 'SFBAudioEngine|AudioPlayer\.mm|AudioPlayer\.h|stop_token|jthread|-std=' build/macos/xcodebuild-diag.log || true

      - name: Build macOS
        run: flutter build macos --release

      - name: Verify universal binary
        run: |
          APP_BINARY="build/macos/Build/Products/Release/VibeFlow.app/Contents/MacOS/VibeFlow"
          ARCHS="$(lipo -archs "$APP_BINARY")"
          echo "$ARCHS"
          if [[ "$ARCHS" != *"arm64"* || "$ARCHS" != *"x86_64"* ]]; then
            echo "Expected a universal binary with arm64 and x86_64 slices."
            exit 1
          fi

      - name: Build DMG staging folder
        run: |
          rm -rf vibeflow-dmg
          mkdir -p vibeflow-dmg
          cp -R build/macos/Build/Products/Release/VibeFlow.app vibeflow-dmg/
          ln -s /Applications vibeflow-dmg/Applications

      - name: Package macOS DMG
        run: |
          hdiutil create \
            -volname "VibeFlow" \
            -srcfolder vibeflow-dmg \
            -ov \
            -format UDZO \
            vibeflow-macos.dmg

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: vibeflow-macos.dmg
