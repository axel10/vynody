name: Build Desktop And Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Build Windows MSIX
        run: dart run msix:create --build-windows false

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $output = "vibeflow-windows.zip"
          if (Test-Path $output) { Remove-Item $output -Force }
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $output

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            vibeflow-windows.zip
            build/windows/msix/*.msix

  linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake pkg-config libgtk-3-dev liblzma-dev tar

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: tar -czf vibeflow-linux.tar.gz -C build/linux/x64/release bundle

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: vibeflow-linux.tar.gz
