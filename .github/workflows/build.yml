name: Build Desktop And Android

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (leave empty to skip release job unless it is a tag push)'
        required: false
        default: ''
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout audio_core submodule
        run: git submodule update --init --force audio_core

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" > android/key.properties
            echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
            echo "Android Keystore and key.properties restored successfully."
          else
            echo "ANDROID_KEYSTORE_BASE64 is not set. Skipping release signing configuration, gradle will fall back to debug signing."
          fi

      - name: Build APK
        env:
          RUST_BACKTRACE: "full"
        run: flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi --split-debug-info=build/app/outputs/symbols -v

      - name: Rename APKs with version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr '+' '-')
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/vynody-android-${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/vynody-android-${VERSION}-arm64-v8a.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/vynody-android-*-armeabi-v7a.apk
            build/app/outputs/flutter-apk/vynody-android-*-arm64-v8a.apk

  windows:
    name: Build Windows Package
    runs-on: windows-2025-vs2026
    env:
      PUB_CACHE: C:\p

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout audio_core submodule
        run: git submodule update --init --force audio_core

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare short cache paths
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:PUB_CACHE | Out-Null

      - name: Install dependencies
        run: flutter pub get

      - name: Patch cargokit symlink resolver
        shell: pwsh
        run: |
          $pubCache = If ($env:PUB_CACHE) { $env:PUB_CACHE } Else { Join-Path $env:LOCALAPPDATA "Pub/Cache" }
          Write-Host "Pub Cache path: $pubCache"
          if (Test-Path $pubCache) {
              Get-ChildItem -Path $pubCache -Filter "resolve_symlinks.ps1" -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
                  Write-Host "Patching pub cache: $_"
                  (Get-Content $_.FullName -Raw) -replace 'Get-Item\s+\$realPath', 'Get-Item -Force $realPath' | Set-Content $_.FullName
              }
          }
          Get-ChildItem -Path . -Filter "resolve_symlinks.ps1" -Recurse -Force -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "Patching workspace: $_"
              (Get-Content $_.FullName -Raw) -replace 'Get-Item\s+\$realPath', 'Get-Item -Force $realPath' | Set-Content $_.FullName
          }

      - name: Build Windows
        env:
          FFMPEG_DIR: ${{ github.workspace }}\audio_core\windows\third_party\ffmpeg
        run: flutter build windows --release -v

      # - name: Build Windows MSIX
      #   run: dart run msix:create --build-windows false

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $appVersion = (Select-String -Path "pubspec.yaml" -Pattern '^version:\s*([0-9]+\.[0-9]+\.[0-9]+)').Matches[0].Groups[1].Value
          if (-not $appVersion) {
            Write-Error "Could not determine app version from pubspec.yaml"
            exit 1
          }
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE "build\\windows\\x64\\runner\\Release"
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "build\\windows\\installer"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" `
            "/DMyAppVersion=$appVersion" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "windows\\installer\\Vynody.iss"

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          if (-not (Test-Path "build/windows/x64/runner/Release/Vynody.exe")) {
            Write-Error "Windows runner executable not found."
            exit 1
          }
          # if (-not (Test-Path "build/windows/msix")) {
          #   Write-Error "MSIX output directory not found."
          #   exit 1
          # }
          # $msixFiles = Get-ChildItem "build/windows/msix" -Filter "*.msix" -Recurse -ErrorAction SilentlyContinue
          # if (-not $msixFiles) {
          #   Write-Error "No .msix package was generated."
          #   exit 1
          # }
          # $msixFiles | ForEach-Object { Write-Host "Found MSIX: $($_.FullName)" }
          $installerFiles = Get-ChildItem "build/windows/installer" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
          if (-not $installerFiles) {
            Write-Error "No Inno Setup installer was generated."
            exit 1
          }
          $installerFiles | ForEach-Object { Write-Host "Found installer: $($_.FullName)" }

      - name: Package and rename Windows artifacts
        shell: pwsh
        run: |
          $appVersion = (Select-String -Path "pubspec.yaml" -Pattern '^version:\s*([0-9]+\.[0-9]+\.[0-9]+)').Matches[0].Groups[1].Value
          if (-not $appVersion) {
            Write-Error "Could not determine app version from pubspec.yaml"
            exit 1
          }
          
          # 1. Package zip with version
          $zipOutput = "vynody-windows-$appVersion.zip"
          if (Test-Path $zipOutput) { Remove-Item $zipOutput -Force }
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $zipOutput

          # 2. Rename MSIX files with version
          # Get-ChildItem "build/windows/msix" -Filter "*.msix" -Recurse | ForEach-Object {
          #     $newName = "vynody-windows-$appVersion.msix"
          #     $newPath = Join-Path $_.DirectoryName $newName
          #     Move-Item $_.FullName $newPath -Force
          # }

          # 3. Rename Inno Setup installer with version
          Get-ChildItem "build/windows/installer" -Filter "*.exe" -Recurse | ForEach-Object {
              $newName = "vynody-windows-$appVersion-setup.exe"
              $newPath = Join-Path $_.DirectoryName $newName
              Move-Item $_.FullName $newPath -Force
          }

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            vynody-windows-*.zip
            build/windows/installer/*.exe

  linux:
    name: Build Linux Package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout audio_core submodule
        run: git submodule update --init --force audio_core

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake pkg-config libgtk-3-dev liblzma-dev tar libasound2-dev libopus-dev libmp3lame-dev libfdk-aac-dev rpm ruby ruby-dev build-essential

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Install appimagetool
        run: |
          sudo wget -O /usr/local/bin/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Package Linux bundle
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr '+' '-')
          tar -czf vynody-linux-$VERSION.tar.gz -C build/linux/x64/release bundle

      - name: Package Linux deb, rpm and AppImage
        run: bash scripts/package_linux.sh

      - name: Verify Linux package artifacts
        run: |
          ls -l build/linux/packages
          compgen -G "build/linux/packages/vynody-linux-*.deb" > /dev/null
          compgen -G "build/linux/packages/vynody-linux-*.rpm" > /dev/null
          compgen -G "build/linux/packages/vynody-linux-*.AppImage" > /dev/null

      - name: Validate deb install on clean Ubuntu
        run: |
          docker run --rm \
            -v "$PWD/build/linux/packages:/packages:ro" \
            ubuntu:22.04 \
            bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y /packages/vynody-linux-*.deb
              test -x /opt/vynody/vynody
              test -x /usr/bin/vynody
              dpkg -s vynody
            '

      - name: Validate rpm install on clean Fedora
        run: |
          docker run --rm \
            -v "$PWD/build/linux/packages:/packages:ro" \
            fedora:40 \
            bash -lc '
              set -euo pipefail
              dnf install -y /packages/vynody-linux-*.rpm
              test -x /opt/vynody/vynody
              test -x /usr/bin/vynody
              rpm -q vynody
            '

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            vynody-linux-*.tar.gz
            build/linux/packages/vynody-linux-*.deb
            build/linux/packages/vynody-linux-*.rpm
            build/linux/packages/vynody-linux-*.AppImage

  macos:
    name: Build macOS Package (Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        xcode: ['26.3']
    env:
      CXXFLAGS: -std=gnu++20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout audio_core submodule
        run: git submodule update --init --force audio_core

      - name: Checkout SFBAudioEngine
        run: |
          git clone https://github.com/axel10/SFBAudioEngine.git audio_core/SFBAudioEngine
          SFB_COMMIT=$(git -C audio_core ls-tree HEAD SFBAudioEngine | awk '{print $3}')
          git -C audio_core/SFBAudioEngine checkout $SFB_COMMIT


      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin, aarch64-apple-darwin
          rustflags: ""

      - name: Print Apple toolchain diagnostics
        run: |
          echo "Runner:"
          uname -a
          sw_vers

          echo "Xcode selection:"
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks

          echo "Tool versions:"
          clang++ --version
          xcrun clang++ --version
          swift --version
          swiftc --version

          echo "SDK info:"
          xcrun --sdk macosx --show-sdk-path
          xcrun --sdk macosx --show-sdk-version

          echo "Available Xcodes:"
          ls -1 /Applications | grep '^Xcode' | sort || true

          echo "C++20 jthread smoke test:"
          cat > /tmp/jthread_test.cpp <<'EOF'
          #include <thread>
          #include <stop_token>
          #include <iostream>

          int main() {
            std::jthread t([](std::stop_token) {});
            std::cout << __cplusplus << std::endl;
            return 0;
          }
          EOF
          xcrun clang++ -std=gnu++20 /tmp/jthread_test.cpp -o /tmp/jthread_test
          /tmp/jthread_test

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Import macOS Certificates
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE_P12_BASE64" ]; then
            echo "MACOS_CERTIFICATE_P12_BASE64 is not set. Skipping certificate import."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 14)
          P12_PATH=$RUNNER_TEMP/certificate.p12
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Clean macOS package caches
        run: |
          rm -rf build/macos

      - name: Resolve macOS Swift packages
        run: xcodebuild -resolvePackageDependencies -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -derivedDataPath build/macos/resolve -clonedSourcePackagesDirPath build/macos/SourcePackages

      - name: Print SFBAudioEngine resolution
        run: |
          echo "Package.resolved entry:"
          grep -n '"location" : "https://github.com/sbooth/SFBAudioEngine"' -A 6 -B 2 macos/Runner.xcworkspace/xcshareddata/swiftpm/Package.resolved || true

          CHECKOUT="build/macos/resolve/SourcePackages/checkouts/SFBAudioEngine"
          if [ -d "$CHECKOUT" ]; then
            echo "Checkout HEAD:"
            git -C "$CHECKOUT" rev-parse HEAD
            echo "Checkout Package.swift:"
            sed -n '1,160p' "$CHECKOUT/Package.swift"
          else
            echo "SFBAudioEngine checkout not found at $CHECKOUT"
          fi

          echo "SwiftPM configuration:"
          find macos/Runner.xcworkspace/xcshareddata/swiftpm -maxdepth 2 -type f | sort | while read -r file; do
            echo "--- $file"
            sed -n '1,120p' "$file"
          done

          echo "Runner build settings:"
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -showBuildSettings | grep -E 'CLANG_CXX_LANGUAGE_STANDARD|OTHER_CPLUSPLUSFLAGS|SWIFT_PACKAGE|PACKAGE' || true

      - name: Xcode diagnostic build
        run: |
          set -o pipefail
          xcodebuild -workspace macos/Runner.xcworkspace -scheme Runner -configuration Release -destination 'platform=macOS' -derivedDataPath build/macos/diag -clonedSourcePackagesDirPath build/macos/SourcePackages -verbose build | tee build/macos/xcodebuild-diag.log || true

          echo "Relevant compile lines:"
          grep -nE 'SFBAudioEngine|AudioPlayer\.mm|AudioPlayer\.h|stop_token|jthread|-std=' build/macos/xcodebuild-diag.log || true

      - name: Build and Package DMG (Signed and Notarized)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Verify universal binary
        run: |
          APP_BINARY="build/macos/Build/Products/Release/Vynody.app/Contents/MacOS/Vynody"
          ARCHS="$(lipo -archs "$APP_BINARY")"
          echo "$ARCHS"
          if [[ "$ARCHS" != *"arm64"* || "$ARCHS" != *"x86_64"* ]]; then
            echo "Expected a universal binary with arm64 and x86_64 slices."
            exit 1
          fi

      - name: Clean up Keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: vynody-macos-*.dmg

  ios:
    name: Build iOS App
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        xcode: ['26.3']
    env:
      CXXFLAGS: -std=gnu++20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout audio_core submodule
        run: git submodule update --init --force audio_core

      - name: Checkout SFBAudioEngine
        run: |
          git clone https://github.com/axel10/SFBAudioEngine.git audio_core/SFBAudioEngine
          SFB_COMMIT=$(git -C audio_core ls-tree HEAD SFBAudioEngine | awk '{print $3}')
          git -C audio_core/SFBAudioEngine checkout $SFB_COMMIT


      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin, x86_64-apple-darwin
          rustflags: ""

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve iOS Swift packages
        run: xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner -configuration Release -derivedDataPath build/ios/resolve -clonedSourcePackagesDirPath build/ios/SourcePackages

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package iOS app
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr '+' '-')
          cd build/ios/iphoneos
          zip -r "../../../vynody-ios-$VERSION.zip" Runner.app

      - name: Upload iOS package
        uses: actions/upload-artifact@v4
        with:
          name: ios-package
          path: vynody-ios-*.zip

  release:
    name: Create Release and Upload Assets
    needs: [android, windows, linux, macos, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download Windows Package
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: artifacts/windows

      - name: Download Linux Package
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: artifacts/linux

      - name: Download macOS Package
        uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: artifacts/macos

      - name: Download iOS Package
        uses: actions/download-artifact@v4
        with:
          name: ios-package
          path: artifacts/ios

      - name: Prepare Assets
        run: |
          mkdir -p release_assets
          # Copy all versioned artifacts starting with vynody- or vynody- to release_assets
          find artifacts -type f \( -name "vynody-*" -o -name "vynody-*" \) -exec cp {} release_assets/ \;
          ls -l release_assets

      - name: Generate Release Body
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: "google/gemini-3.1-flash-lite"
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          REPO="${{ github.repository }}"
          
          python3 scripts/translate_release_notes.py "$TAG_NAME"
          
          echo "## 📦 Downloads / 下载" >> release_notes.md
          echo "" >> release_notes.md
          
          if ls release_assets/vynody-android-* >/dev/null 2>&1; then
            echo "### 📱 Android" >> release_notes.md
            for f in release_assets/vynody-android-*; do
              fname=$(basename "$f")
              echo "- [$fname](https://github.com/${REPO}/releases/download/${TAG_NAME}/${fname})" >> release_notes.md
            done
            echo "" >> release_notes.md
          fi
          
          if ls release_assets/vynody-windows-* >/dev/null 2>&1; then
            echo "### 💻 Windows" >> release_notes.md
            for f in release_assets/vynody-windows-*; do
              fname=$(basename "$f")
              echo "- [$fname](https://github.com/${REPO}/releases/download/${TAG_NAME}/${fname})" >> release_notes.md
            done
            echo "" >> release_notes.md
          fi
          
          if ls release_assets/vynody-macos-* >/dev/null 2>&1; then
            echo "### 🍏 macOS" >> release_notes.md
            for f in release_assets/vynody-macos-*; do
              fname=$(basename "$f")
              echo "- [$fname](https://github.com/${REPO}/releases/download/${TAG_NAME}/${fname})" >> release_notes.md
            done
            echo "" >> release_notes.md
          fi
          
          if ls release_assets/vynody-linux-* >/dev/null 2>&1; then
            echo "### 🐧 Linux" >> release_notes.md
            for f in release_assets/vynody-linux-*; do
              fname=$(basename "$f")
              echo "- [$fname](https://github.com/${REPO}/releases/download/${TAG_NAME}/${fname})" >> release_notes.md
            done
            echo "" >> release_notes.md
          fi
          
          if ls release_assets/vynody-ios-* >/dev/null 2>&1; then
            echo "### 🍎 iOS" >> release_notes.md
            for f in release_assets/vynody-ios-*; do
              fname=$(basename "$f")
              echo "- [$fname](https://github.com/${REPO}/releases/download/${TAG_NAME}/${fname})" >> release_notes.md
            done
            echo "" >> release_notes.md
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          body_path: release_notes.md
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
